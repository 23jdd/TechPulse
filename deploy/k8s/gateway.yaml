apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: techpulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: gateway
          image: techpulse:latest
          imagePullPolicy: IfNotPresent
          command: ["gateway"]
          envFrom:
            - configMapRef:
                name: techpulse-config
          env:
            - name: MYSQL_DSN
              value: root:password@tcp(mysql:3306)/techpulse?parseTime=true&charset=utf8mb4&multiStatements=true
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: techpulse
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
