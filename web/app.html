<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TechPulse App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#17202a",
            muted: "#667085",
            line: "#d9dee7",
            brand: "#0f766e",
            brandDark: "#115e59",
            paper: "#f6f7f9"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-paper text-ink antialiased">
  <header class="sticky top-0 z-20 border-b border-line bg-white/95 backdrop-blur">
    <div class="flex min-h-16 flex-wrap items-center gap-3 px-4 py-3 lg:flex-nowrap">
      <a href="/app" class="flex min-w-52 items-center gap-3">
        <span class="flex h-10 w-10 items-center justify-center rounded-lg bg-brand text-white">
          <i data-lucide="activity" class="h-5 w-5"></i>
        </span>
        <span>
          <span class="block text-base font-semibold">TechPulse</span>
          <span class="block text-xs text-muted">Developer reader</span>
        </span>
      </a>
      <form onsubmit="searchArticles(event)" class="flex min-w-0 flex-1 items-center gap-2">
        <div class="relative min-w-0 flex-1">
          <i data-lucide="search" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted"></i>
          <input id="query" class="h-10 w-full rounded-md border border-line bg-white pl-9 pr-3 text-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/10" placeholder="Search articles, releases, tags">
        </div>
        <input id="tagFilter" class="hidden h-10 w-40 rounded-md border border-line bg-white px-3 text-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/10 md:block" placeholder="Tag">
        <button class="inline-flex h-10 w-10 items-center justify-center rounded-md bg-brand text-white hover:bg-brandDark" title="Search" aria-label="Search">
          <i data-lucide="search" class="h-4 w-4"></i>
        </button>
      </form>
      <nav class="flex items-center gap-2">
        <a href="/app/zh" class="inline-flex h-10 items-center rounded-md border border-line bg-white px-3 text-sm text-muted hover:bg-slate-50">中文</a>
        <a href="/login" class="inline-flex h-10 items-center gap-2 rounded-md border border-line bg-white px-3 text-sm font-medium hover:bg-slate-50">
          <i data-lucide="log-in" class="h-4 w-4"></i>
          Login
        </a>
      </nav>
    </div>
  </header>

  <main class="grid gap-4 p-4 xl:grid-cols-[280px_minmax(0,1fr)_420px]">
    <aside class="space-y-4">
      <section class="rounded-lg border border-line bg-white p-4">
        <div class="flex items-center justify-between gap-3">
          <div>
            <p class="text-xs font-medium uppercase tracking-wide text-muted">Session</p>
            <p id="session" class="mt-1 text-sm font-medium">Local demo</p>
          </div>
          <span id="health" class="rounded-full border border-line px-2 py-1 text-xs text-muted">checking</span>
        </div>
      </section>

      <section class="rounded-lg border border-line bg-white p-4">
        <div class="mb-3 flex items-center justify-between gap-2">
          <h2 class="text-sm font-semibold">Library</h2>
          <button onclick="loadArticles()" class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-line hover:bg-slate-50" title="Refresh" aria-label="Refresh">
            <i data-lucide="refresh-cw" class="h-4 w-4"></i>
          </button>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="loadArticles()" class="nav-btn"><i data-lucide="newspaper" class="h-4 w-4"></i> Stream</button>
          <button onclick="loadFavorites('favorite')" class="nav-btn"><i data-lucide="star" class="h-4 w-4"></i> Saved</button>
          <button onclick="loadFavorites('read_later')" class="nav-btn"><i data-lucide="clock-3" class="h-4 w-4"></i> Later</button>
          <button onclick="loadHistory()" class="nav-btn"><i data-lucide="history" class="h-4 w-4"></i> History</button>
        </div>
      </section>

      <section class="rounded-lg border border-line bg-white p-4">
        <div class="mb-3 flex items-center justify-between gap-2">
          <h2 class="text-sm font-semibold">Tasks</h2>
          <button onclick="loadTasks()" class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-line hover:bg-slate-50" title="Reload tasks" aria-label="Reload tasks">
            <i data-lucide="list-checks" class="h-4 w-4"></i>
          </button>
        </div>
        <div id="tasks" class="space-y-2"></div>
      </section>

      <section class="rounded-lg border border-line bg-white p-4">
        <div class="mb-3 flex items-center justify-between gap-2">
          <h2 class="text-sm font-semibold">Sources</h2>
          <button onclick="loadFeeds()" class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-line hover:bg-slate-50" title="Reload sources" aria-label="Reload sources">
            <i data-lucide="rotate-cw" class="h-4 w-4"></i>
          </button>
        </div>
        <form onsubmit="addFeed(event)" class="space-y-2">
          <input id="feedUrl" class="field" placeholder="RSS URL">
          <input id="feedTitle" class="field" placeholder="Title">
          <div class="grid grid-cols-[1fr_92px] gap-2">
            <input id="feedCategory" class="field" placeholder="Category">
            <input id="feedInterval" type="number" min="5" value="60" class="field" title="Fetch interval minutes" aria-label="Fetch interval minutes">
          </div>
          <button class="action-primary w-full"><i data-lucide="plus" class="h-4 w-4"></i> Add source</button>
        </form>
        <div class="mt-3 grid grid-cols-[1fr_40px] gap-2">
          <input id="githubUrl" class="field" placeholder="GitHub repository URL">
          <button onclick="fetchGitHubReleases()" class="icon-btn bg-ink text-white hover:bg-slate-800" title="Fetch releases" aria-label="Fetch releases">
            <i data-lucide="github" class="h-4 w-4"></i>
          </button>
        </div>
        <div class="mt-3 grid grid-cols-[1fr_72px_40px] gap-2">
          <select id="hnFeed" class="field">
            <option value="top">HN Top</option>
            <option value="new">HN New</option>
            <option value="best">HN Best</option>
            <option value="ask">Ask HN</option>
            <option value="show">Show HN</option>
          </select>
          <input id="hnLimit" type="number" min="1" max="50" value="20" class="field" title="HN limit" aria-label="HN limit">
          <button onclick="fetchHackerNews()" class="icon-btn bg-orange-600 text-white hover:bg-orange-700" title="Fetch Hacker News" aria-label="Fetch Hacker News">
            <i data-lucide="flame" class="h-4 w-4"></i>
          </button>
        </div>
        <div id="feeds" class="mt-4 space-y-2"></div>
      </section>
    </aside>

    <section class="min-w-0 rounded-lg border border-line bg-white">
      <div class="flex flex-wrap items-center justify-between gap-3 border-b border-line px-4 py-3">
        <div>
          <h1 id="listTitle" class="text-base font-semibold">For you</h1>
          <p id="listMeta" class="text-xs text-muted">Latest technical signals</p>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="loadArticles('?read=false')" class="chip"><i data-lucide="circle-dot" class="h-3.5 w-3.5"></i> Unread</button>
          <button onclick="loadArticles('?archived=true')" class="chip"><i data-lucide="archive" class="h-3.5 w-3.5"></i> Archive</button>
        </div>
      </div>
      <div id="articleList" class="divide-y divide-line"></div>
    </section>

    <aside class="space-y-4">
      <section class="rounded-lg border border-line bg-white">
        <div class="border-b border-line px-4 py-3">
          <h2 class="text-sm font-semibold">Reader</h2>
        </div>
        <div id="selected" class="p-4 text-sm text-muted">Select an article to read the AI summary.</div>
        <div id="summary" class="hidden border-t border-line p-4 text-sm leading-6"></div>
      </section>

      <section class="rounded-lg border border-line bg-white p-4">
        <h2 class="text-sm font-semibold">Ask TechPulse</h2>
        <textarea id="question" class="mt-3 min-h-24 w-full resize-y rounded-md border border-line px-3 py-2 text-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/10" placeholder="Ask about your saved technical articles"></textarea>
        <button onclick="ask()" class="action-primary mt-2 w-full"><i data-lucide="sparkles" class="h-4 w-4"></i> Ask</button>
        <div id="answer" class="mt-4 text-sm leading-6 text-ink"></div>
        <div id="citations" class="mt-3 space-y-2"></div>
      </section>

      <section class="rounded-lg border border-line bg-white p-4">
        <h2 class="text-sm font-semibold">Daily report</h2>
        <div class="mt-3 grid grid-cols-[1fr_40px] gap-2">
          <input id="reportTitle" class="field" placeholder="Report title">
          <button onclick="generateReport()" class="icon-btn bg-brand text-white hover:bg-brandDark" title="Generate report" aria-label="Generate report">
            <i data-lucide="file-text" class="h-4 w-4"></i>
          </button>
        </div>
        <div id="report" class="mt-4 max-h-64 overflow-auto whitespace-pre-wrap text-sm leading-6"></div>
      </section>
    </aside>
  </main>

  <div id="toast" class="fixed bottom-4 left-1/2 z-30 hidden max-w-[calc(100vw-32px)] -translate-x-1/2 rounded-md bg-ink px-4 py-2 text-sm text-white shadow-lg"></div>

  <script>
    window.TECHPULSE_I18N = {
      emptyArticles: "No articles yet. Add a source and fetch it.",
      emptyFeeds: "No sources yet.",
      loading: "Loading...",
      failed: "Request failed",
      ok: "ok",
      error: "error",
      localDemo: "Local demo",
      githubUser: "GitHub user",
      tokenMode: "Token mode",
      streamTitle: "For you",
      streamMeta: "Latest technical signals",
      savedTitle: "Saved articles",
      savedMeta: "Articles you starred",
      laterTitle: "Read later",
      laterMeta: "Queued for focused reading",
      historyTitle: "Reading history",
      historyMeta: "Recently opened articles",
      searchTitle: "Search results",
      searchMeta: "Matched by title, summary, content, or tags",
      selectedHint: "Select an article to read the AI summary.",
      open: "Open",
      read: "Read",
      save: "Save",
      later: "Later",
      archive: "Archive",
      delete: "Delete",
      fetch: "Fetch",
      test: "Test",
      disable: "Disable",
      enable: "Enable",
      sourceAdded: "Source added",
      sourceDeleted: "Source deleted",
      sourceUpdated: "Source updated",
      fetched: "Fetch completed",
      fetchQueued: "Fetch queued",
      emptyTasks: "No tasks yet.",
      saved: "Saved",
      queued: "Added to read later",
      archived: "Archived",
      deleted: "Deleted",
      readDone: "Marked as read",
      askRequired: "Question is required.",
      reportTitle: "TechPulse Daily Report",
      generated: "Report generated",
      noSummary: "No summary is available for this article yet.",
      copied: "Copied"
    };
  </script>
  <script src="/app.js"></script>
</body>
</html>
