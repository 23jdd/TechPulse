<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TechPulse 应用</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#17202a",
            muted: "#667085",
            line: "#d9dee7",
            brand: "#0f766e",
            brandDark: "#115e59",
            paper: "#f6f7f9"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-paper text-ink antialiased">
  <header class="sticky top-0 z-20 border-b border-line bg-white/95 backdrop-blur">
    <div class="flex min-h-16 flex-wrap items-center gap-3 px-4 py-3 lg:flex-nowrap">
      <a href="/app/zh" class="flex min-w-52 items-center gap-3">
        <span class="flex h-10 w-10 items-center justify-center rounded-lg bg-brand text-white">
          <i data-lucide="activity" class="h-5 w-5"></i>
        </span>
        <span>
          <span class="block text-base font-semibold">TechPulse</span>
          <span class="block text-xs text-muted">技术阅读工作台</span>
        </span>
      </a>
      <form onsubmit="searchArticles(event)" class="flex min-w-0 flex-1 items-center gap-2">
        <div class="relative min-w-0 flex-1">
          <i data-lucide="search" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-muted"></i>
          <input id="query" class="h-10 w-full rounded-md border border-line bg-white pl-9 pr-3 text-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/10" placeholder="搜索文章、Release、标签">
        </div>
        <input id="tagFilter" class="hidden h-10 w-40 rounded-md border border-line bg-white px-3 text-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/10 md:block" placeholder="标签">
        <button class="inline-flex h-10 w-10 items-center justify-center rounded-md bg-brand text-white hover:bg-brandDark" title="搜索" aria-label="搜索">
          <i data-lucide="search" class="h-4 w-4"></i>
        </button>
      </form>
      <nav class="flex items-center gap-2">
        <a href="/app" class="inline-flex h-10 items-center rounded-md border border-line bg-white px-3 text-sm text-muted hover:bg-slate-50">English</a>
        <a href="/login/zh" class="inline-flex h-10 items-center gap-2 rounded-md border border-line bg-white px-3 text-sm font-medium hover:bg-slate-50">
          <i data-lucide="log-in" class="h-4 w-4"></i>
          登录
        </a>
      </nav>
    </div>
  </header>

  <main class="grid gap-4 p-4 xl:grid-cols-[280px_minmax(0,1fr)_420px]">
    <aside class="space-y-4">
      <section class="rounded-lg border border-line bg-white p-4">
        <div class="flex items-center justify-between gap-3">
          <div>
            <p class="text-xs font-medium uppercase tracking-wide text-muted">会话</p>
            <p id="session" class="mt-1 text-sm font-medium">本地演示</p>
          </div>
          <span id="health" class="rounded-full border border-line px-2 py-1 text-xs text-muted">检查中</span>
        </div>
      </section>

      <section class="rounded-lg border border-line bg-white p-4">
        <div class="mb-3 flex items-center justify-between gap-2">
          <h2 class="text-sm font-semibold">阅读库</h2>
          <button onclick="loadArticles()" class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-line hover:bg-slate-50" title="刷新" aria-label="刷新">
            <i data-lucide="refresh-cw" class="h-4 w-4"></i>
          </button>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="loadArticles()" class="nav-btn"><i data-lucide="newspaper" class="h-4 w-4"></i> 信息流</button>
          <button onclick="loadFavorites('favorite')" class="nav-btn"><i data-lucide="star" class="h-4 w-4"></i> 收藏</button>
          <button onclick="loadFavorites('read_later')" class="nav-btn"><i data-lucide="clock-3" class="h-4 w-4"></i> 稍后读</button>
          <button onclick="loadHistory()" class="nav-btn"><i data-lucide="history" class="h-4 w-4"></i> 历史</button>
        </div>
      </section>

      <section class="rounded-lg border border-line bg-white p-4">
        <div class="mb-3 flex items-center justify-between gap-2">
          <h2 class="text-sm font-semibold">任务</h2>
          <button onclick="loadTasks()" class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-line hover:bg-slate-50" title="重新加载任务" aria-label="重新加载任务">
            <i data-lucide="list-checks" class="h-4 w-4"></i>
          </button>
        </div>
        <div id="tasks" class="space-y-2"></div>
      </section>

      <section class="rounded-lg border border-line bg-white p-4">
        <div class="mb-3 flex items-center justify-between gap-2">
          <h2 class="text-sm font-semibold">订阅源</h2>
          <button onclick="loadFeeds()" class="inline-flex h-8 w-8 items-center justify-center rounded-md border border-line hover:bg-slate-50" title="重新加载订阅源" aria-label="重新加载订阅源">
            <i data-lucide="rotate-cw" class="h-4 w-4"></i>
          </button>
        </div>
        <form onsubmit="addFeed(event)" class="space-y-2">
          <input id="feedUrl" class="field" placeholder="RSS 地址">
          <input id="feedTitle" class="field" placeholder="标题">
          <div class="grid grid-cols-[1fr_92px] gap-2">
            <input id="feedCategory" class="field" placeholder="分类">
            <input id="feedInterval" type="number" min="5" value="60" class="field" title="抓取间隔分钟" aria-label="抓取间隔分钟">
          </div>
          <button class="action-primary w-full"><i data-lucide="plus" class="h-4 w-4"></i> 添加订阅</button>
        </form>
        <div class="mt-3 grid grid-cols-[1fr_40px] gap-2">
          <input id="githubUrl" class="field" placeholder="GitHub 仓库地址">
          <button onclick="fetchGitHubReleases()" class="icon-btn bg-ink text-white hover:bg-slate-800" title="抓取 Release" aria-label="抓取 Release">
            <i data-lucide="github" class="h-4 w-4"></i>
          </button>
        </div>
        <div class="mt-3 grid grid-cols-[1fr_72px_40px] gap-2">
          <select id="hnFeed" class="field">
            <option value="top">HN 热榜</option>
            <option value="new">HN 最新</option>
            <option value="best">HN 最佳</option>
            <option value="ask">Ask HN</option>
            <option value="show">Show HN</option>
          </select>
          <input id="hnLimit" type="number" min="1" max="50" value="20" class="field" title="HN 数量" aria-label="HN 数量">
          <button onclick="fetchHackerNews()" class="icon-btn bg-orange-600 text-white hover:bg-orange-700" title="抓取 Hacker News" aria-label="抓取 Hacker News">
            <i data-lucide="flame" class="h-4 w-4"></i>
          </button>
        </div>
        <div id="feeds" class="mt-4 space-y-2"></div>
      </section>
    </aside>

    <section class="min-w-0 rounded-lg border border-line bg-white">
      <div class="flex flex-wrap items-center justify-between gap-3 border-b border-line px-4 py-3">
        <div>
          <h1 id="listTitle" class="text-base font-semibold">推荐阅读</h1>
          <p id="listMeta" class="text-xs text-muted">最新技术信号</p>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="loadArticles('?read=false')" class="chip"><i data-lucide="circle-dot" class="h-3.5 w-3.5"></i> 未读</button>
          <button onclick="loadArticles('?archived=true')" class="chip"><i data-lucide="archive" class="h-3.5 w-3.5"></i> 归档</button>
        </div>
      </div>
      <div id="articleList" class="divide-y divide-line"></div>
    </section>

    <aside class="space-y-4">
      <section class="rounded-lg border border-line bg-white">
        <div class="border-b border-line px-4 py-3">
          <h2 class="text-sm font-semibold">阅读器</h2>
        </div>
        <div id="selected" class="p-4 text-sm text-muted">选择一篇文章查看 AI 摘要。</div>
        <div id="summary" class="hidden border-t border-line p-4 text-sm leading-6"></div>
      </section>

      <section class="rounded-lg border border-line bg-white p-4">
        <h2 class="text-sm font-semibold">问 TechPulse</h2>
        <textarea id="question" class="mt-3 min-h-24 w-full resize-y rounded-md border border-line px-3 py-2 text-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/10" placeholder="向你的技术文章库提问"></textarea>
        <button onclick="ask()" class="action-primary mt-2 w-full"><i data-lucide="sparkles" class="h-4 w-4"></i> 提问</button>
        <div id="answer" class="mt-4 text-sm leading-6 text-ink"></div>
        <div id="citations" class="mt-3 space-y-2"></div>
      </section>

      <section class="rounded-lg border border-line bg-white p-4">
        <div class="flex items-center justify-between gap-3">
          <h2 class="text-sm font-semibold">趋势</h2>
          <select id="trendDays" onchange="loadTrends()" class="h-8 rounded-md border border-line bg-white px-2 text-xs outline-none focus:border-brand">
            <option value="7">7 天</option>
            <option value="30">30 天</option>
            <option value="90">90 天</option>
          </select>
        </div>
        <div id="trends" class="mt-3 space-y-3"></div>
      </section>

      <section class="rounded-lg border border-line bg-white p-4">
        <h2 class="text-sm font-semibold">每日报告</h2>
        <div class="mt-3 grid grid-cols-[1fr_40px] gap-2">
          <input id="reportTitle" class="field" placeholder="报告标题">
          <button onclick="generateReport()" class="icon-btn bg-brand text-white hover:bg-brandDark" title="生成报告" aria-label="生成报告">
            <i data-lucide="file-text" class="h-4 w-4"></i>
          </button>
        </div>
        <div id="report" class="mt-4 max-h-64 overflow-auto whitespace-pre-wrap text-sm leading-6"></div>
      </section>
    </aside>
  </main>

  <div id="toast" class="fixed bottom-4 left-1/2 z-30 hidden max-w-[calc(100vw-32px)] -translate-x-1/2 rounded-md bg-ink px-4 py-2 text-sm text-white shadow-lg"></div>

  <script>
    window.TECHPULSE_I18N = {
      emptyArticles: "还没有文章。先添加订阅源并抓取。",
      emptyFeeds: "还没有订阅源。",
      loading: "加载中...",
      failed: "请求失败",
      ok: "正常",
      error: "异常",
      localDemo: "本地演示",
      githubUser: "GitHub 用户",
      tokenMode: "Token 模式",
      streamTitle: "推荐阅读",
      streamMeta: "最新技术信号",
      savedTitle: "收藏文章",
      savedMeta: "你收藏的文章",
      laterTitle: "稍后阅读",
      laterMeta: "适合专注阅读的队列",
      historyTitle: "阅读历史",
      historyMeta: "最近打开过的文章",
      searchTitle: "搜索结果",
      searchMeta: "按标题、摘要、正文或标签匹配",
      selectedHint: "选择一篇文章查看 AI 摘要。",
      open: "打开",
      read: "已读",
      save: "收藏",
      later: "稍后读",
      archive: "归档",
      delete: "删除",
      fetch: "抓取",
      test: "测试",
      disable: "停用",
      enable: "启用",
      sourceAdded: "订阅源已添加",
      sourceDeleted: "订阅源已删除",
      sourceUpdated: "订阅源已更新",
      fetched: "抓取完成",
      fetchQueued: "抓取任务已入队",
      emptyTasks: "还没有任务。",
      emptyTrends: "还没有趋势数据。",
      trendTags: "标签",
      trendSources: "来源",
      trendDaily: "每日",
      saved: "已收藏",
      queued: "已加入稍后读",
      archived: "已归档",
      deleted: "已删除",
      readDone: "已标记为已读",
      askRequired: "请输入问题。",
      reportTitle: "TechPulse 每日报告",
      generated: "报告已生成",
      noSummary: "这篇文章暂时还没有摘要。",
      copied: "已复制"
    };
  </script>
  <script src="/app.js"></script>
</body>
</html>
