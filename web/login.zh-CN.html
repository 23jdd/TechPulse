<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - TechPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#17202a",
            muted: "#667085",
            line: "#d9dee7",
            brand: "#0f766e",
            brandDark: "#115e59"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-[#f6f7f9] text-ink antialiased">
  <main class="grid min-h-screen lg:grid-cols-[minmax(0,1fr)_480px]">
    <section class="hidden border-r border-line bg-white p-10 lg:flex lg:flex-col lg:justify-between">
      <div>
        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-brand text-white">
            <i data-lucide="activity" class="h-5 w-5"></i>
          </div>
          <div>
            <h1 class="text-lg font-semibold">TechPulse</h1>
            <p class="text-sm text-muted">AI 开发者技术情报平台</p>
          </div>
        </div>
        <div class="mt-16 max-w-2xl">
          <p class="text-sm font-medium uppercase tracking-wide text-muted">Knowledge workflow</p>
          <h2 class="mt-3 text-4xl font-semibold leading-tight tracking-normal">采集、总结、搜索，并基于技术信息进行问答。</h2>
          <p class="mt-5 text-base leading-7 text-muted">使用 GitHub OAuth 登录，或者在本地演示时直接进入 Demo 模式。</p>
        </div>
      </div>
      <div class="grid max-w-2xl grid-cols-3 gap-3 text-sm">
        <div class="rounded-lg border border-line p-4">
          <i data-lucide="rss" class="h-5 w-5 text-brand"></i>
          <p class="mt-3 font-medium">RSS / Release</p>
        </div>
        <div class="rounded-lg border border-line p-4">
          <i data-lucide="search" class="h-5 w-5 text-brand"></i>
          <p class="mt-3 font-medium">全文搜索</p>
        </div>
        <div class="rounded-lg border border-line p-4">
          <i data-lucide="sparkles" class="h-5 w-5 text-brand"></i>
          <p class="mt-3 font-medium">RAG 问答</p>
        </div>
      </div>
    </section>

    <section class="flex items-center justify-center p-5">
      <div class="w-full max-w-md rounded-lg border border-line bg-white p-6 shadow-sm">
        <div class="mb-6 flex items-start justify-between gap-3">
          <div>
            <h2 class="text-xl font-semibold">登录</h2>
            <p class="mt-1 text-sm text-muted">进入你的 Feed、收藏文章和每日技术日报。</p>
          </div>
          <a href="/login" class="rounded-md border border-line px-3 py-1.5 text-sm text-muted hover:bg-slate-50">English</a>
        </div>

        <div class="space-y-3">
          <button onclick="githubLogin()" class="inline-flex w-full items-center justify-center gap-2 rounded-md bg-ink px-3 py-2.5 text-sm font-medium text-white hover:bg-slate-800">
            <i data-lucide="github" class="h-4 w-4"></i> 使用 GitHub 登录
          </button>
          <button onclick="demoLogin()" class="inline-flex w-full items-center justify-center gap-2 rounded-md border border-line bg-white px-3 py-2.5 text-sm font-medium text-ink hover:bg-slate-50">
            <i data-lucide="monitor-play" class="h-4 w-4"></i> Demo 登录
          </button>
        </div>

        <div class="my-6 flex items-center gap-3">
          <div class="h-px flex-1 bg-line"></div>
          <span class="text-xs text-muted">或</span>
          <div class="h-px flex-1 bg-line"></div>
        </div>

        <label class="block text-xs font-medium text-muted" for="token">API Token</label>
        <input id="token" class="mt-1 w-full rounded-md border border-line px-3 py-2 text-sm outline-none focus:border-brand focus:ring-2 focus:ring-brand/10" placeholder="粘贴本地测试 token">
        <button onclick="tokenLogin()" class="mt-3 inline-flex w-full items-center justify-center gap-2 rounded-md bg-brand px-3 py-2.5 text-sm font-medium text-white hover:bg-brandDark">
          <i data-lucide="key-round" class="h-4 w-4"></i> 保存 Token
        </button>

        <p id="message" class="mt-4 min-h-5 text-sm text-muted"></p>
        <p class="mt-5 text-xs leading-5 text-muted">本地 demo API 仍使用默认用户，直到启用完整 JWT/session 鉴权。这个登录页用于展示产品登录流程。</p>
      </div>
    </section>
  </main>

  <script>
    const API = window.location.origin || "http://localhost:8080";

    function setMessage(text, error = false) {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = `mt-4 min-h-5 text-sm ${error ? "text-rose-700" : "text-muted"}`;
    }

    async function githubLogin() {
      setMessage("正在准备 GitHub 登录...");
      try {
        const res = await fetch(`${API}/api/v1/auth/github/url?ui=1&locale=zh`);
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        window.location.href = data.url;
      } catch (err) {
        setMessage("GitHub OAuth 尚未配置，本地演示可使用 Demo 登录。", true);
      }
    }

    function demoLogin() {
      localStorage.setItem("techpulse_session", JSON.stringify({mode: "demo", user: "demo"}));
      window.location.href = "/dashboard/zh";
    }

    function tokenLogin() {
      const token = document.getElementById("token").value.trim();
      if (!token) {
        setMessage("请填写 Token。", true);
        return;
      }
      localStorage.setItem("techpulse_api_token", token);
      localStorage.setItem("techpulse_session", JSON.stringify({mode: "token"}));
      window.location.href = "/dashboard/zh";
    }

    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
